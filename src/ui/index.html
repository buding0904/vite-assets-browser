<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assets Browser</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1a;
    --card: #2a2a2a;
    --card-hover: #333;
    --border: #3a3a3a;
    --text: #e0e0e0;
    --text-muted: #888;
    --accent: #646cff;
    --accent-hover: #7c84ff;
    --danger: #ff6464;
    --success: #64c864;
    --radius: 8px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    min-height: 100vh;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(26,26,26,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-title svg { opacity: 0.7; }

  .search-wrap {
    flex: 1;
    max-width: 360px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 6px 10px 6px 32px;
    outline: none;
    transition: border-color 0.15s;
  }

  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-muted); }

  /* Filter bar */
  .filter-bar {
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 12px;
    padding: 4px 12px;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .count {
    margin-left: auto;
    color: var(--text-muted);
    font-size: 12px;
    white-space: nowrap;
  }

  /* Grid */
  .grid-wrap {
    padding: 20px;
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s, transform 0.15s;
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .card-preview {
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background-color: #222;
    background-image:
      linear-gradient(45deg, #333 25%, transparent 25%),
      linear-gradient(-45deg, #333 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #333 75%),
      linear-gradient(-45deg, transparent 75%, #333 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    position: relative;
  }

  .svg-wrap {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }

  .svg-wrap svg {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .card-preview img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }

  .card-preview video {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }

  .font-preview {
    font-size: 28px;
    color: var(--text);
    letter-spacing: 0.05em;
    user-select: none;
  }

  .type-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    background: rgba(0,0,0,0.55);
    border-radius: 4px;
    color: #ccc;
    font-size: 10px;
    padding: 2px 5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .card-info {
    padding: 8px 10px 6px;
    flex: 1;
    min-width: 0;
  }

  .card-name {
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
    margin-bottom: 3px;
  }

  .card-meta {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Card actions */
  .card-actions {
    display: flex;
    border-top: 1px solid var(--border);
    padding: 0;
  }

  .action-btn {
    flex: 1;
    background: transparent;
    border: none;
    border-right: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    font-size: 10px;
    padding: 6px 4px;
    transition: background 0.12s, color 0.12s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    position: relative;
    overflow: visible;
  }

  .action-btn:last-child { border-right: none; }
  .action-btn:hover { background: var(--card-hover); color: var(--text); }
  .action-btn svg { flex-shrink: 0; }

  .action-btn .label {
    font-size: 9px;
    line-height: 1;
    white-space: nowrap;
  }

  /* Global tooltip */
  #tooltip {
    position: fixed;
    background: #111;
    border: 1px solid #444;
    color: var(--text);
    font-size: 11px;
    font-family: var(--font);
    line-height: 1.4;
    padding: 4px 8px;
    border-radius: 5px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;
    z-index: 9999;
    max-width: 320px;
    word-break: break-all;
    white-space: normal;
  }
  #tooltip.show { opacity: 1; }

  /* action-btn copied state */
  .action-btn.copied {
    color: var(--success);
  }

  /* Empty state */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty svg { opacity: 0.3; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  /* Sentinel */
  #sentinel { height: 1px; }

  /* Live update indicator */
  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .live-dot.connected { background: var(--success); }
  .live-dot.active {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  /* Card add animation */
  @keyframes card-in {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }
  .card-new { animation: card-in 0.2s ease; }

  /* Card update flash */
  @keyframes card-flash {
    0%   { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(100,108,255,0.3); }
    100% { border-color: var(--border); box-shadow: none; }
  }
  .card-updated { animation: card-flash 0.8s ease forwards; }

  /* Folder filter bar */
  .folder-bar {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .folder-bar::-webkit-scrollbar { height: 4px; }
  .folder-bar::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

  .folder-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    color: var(--text);
    cursor: pointer;
    font-size: 12px;
    padding: 5px 12px;
    white-space: nowrap;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .folder-chip:hover { border-color: var(--accent); }
  .folder-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .folder-chip .folder-count {
    opacity: 0.7;
    font-size: 11px;
  }

  /* Group header */
  .group-header {
    grid-column: 1 / -1;
    padding: 16px 0 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .group-header:hover { color: var(--accent); }
  .group-header .folder-icon { opacity: 0.6; flex-shrink: 0; }
  .group-header .group-count {
    opacity: 0.45;
    font-weight: 400;
    font-size: 12px;
    margin-left: 2px;
  }
  .group-chevron {
    flex-shrink: 0;
    opacity: 0.5;
    transition: transform 0.2s ease;
    margin-left: auto;
  }
  .group-header.collapsed .group-chevron { transform: rotate(-90deg); }
  .card.group-collapsed { display: none !important; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }
</style>
</head>
<body>

<div id="tooltip"></div>

<header class="header">
  <div class="header-title">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    Assets Browser
    <span class="live-dot" id="live-dot" data-tooltip="Live updates"></span>
  </div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search" type="text" placeholder="Search by filename…" autocomplete="off" spellcheck="false">
  </div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" data-type="all" data-tooltip="Show all assets">All</button>
  <button class="filter-btn" data-type="image" data-tooltip="PNG · JPG · GIF · WebP · SVG · ICO">Images</button>
  <button class="filter-btn" data-type="video" data-tooltip="MP4 · WebM · OGG · MOV">Videos</button>
  <button class="filter-btn" data-type="font" data-tooltip="WOFF · WOFF2 · TTF · OTF · EOT">Fonts</button>
  <span class="count" id="count"></span>
</div>

<div class="folder-bar" id="folder-bar"></div>

<div class="grid-wrap">
  <div id="grid">
    <div class="loading">Loading assets…</div>
  </div>
  <div id="sentinel"></div>
</div>

<script>
  const PORT = '__PORT__'
  const PAGE_SIZE = 40

  let allAssets = []
  let filteredAssets = []
  let groupedAssets = new Map()   // dir -> Asset[]
  let renderedCount = 0
  let activeType = 'all'
  let searchTerm = ''
  let activeFolder = null
  let collapsedFolders = new Set()

  const grid = document.getElementById('grid')
  const countEl = document.getElementById('count')
  const searchEl = document.getElementById('search')
  const folderBar = document.getElementById('folder-bar')

  // ── Fetch ──────────────────────────────────────────────────────────────────
  async function loadAssets() {
    try {
      const res = await fetch('/api/assets')
      allAssets = await res.json()
      applyFilter()
    } catch (e) {
      grid.innerHTML = `<div class="empty"><p>Failed to load assets</p></div>`
    }
  }

  // ── Folder bar ─────────────────────────────────────────────────────────────
  function buildFolderBar() {
    // Count assets per folder respecting type filter only (not folder filter)
    const q = searchTerm.toLowerCase()
    const typeFiltered = allAssets.filter(a => {
      const typeMatch = activeType === 'all' || a.type === activeType
      const nameMatch = !q || a.filename.toLowerCase().includes(q)
      return typeMatch && nameMatch
    })

    const folderCounts = new Map()
    for (const a of typeFiltered) {
      const dir = a.directory || '.'
      folderCounts.set(dir, (folderCounts.get(dir) || 0) + 1)
    }

    folderBar.innerHTML = ''
    if (folderCounts.size <= 1) return

    const allChip = document.createElement('button')
    allChip.className = 'folder-chip' + (activeFolder === null ? ' active' : '')
    allChip.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> All folders <span class="folder-count">${typeFiltered.length}</span>`
    allChip.addEventListener('click', () => { activeFolder = null; applyFilter() })
    folderBar.appendChild(allChip)

    const sorted = [...folderCounts.entries()].sort((a, b) => a[0].localeCompare(b[0]))
    for (const [dir, count] of sorted) {
      const chip = document.createElement('button')
      chip.className = 'folder-chip' + (activeFolder === dir ? ' active' : '')
      chip.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> ${dir} <span class="folder-count">${count}</span>`
      chip.dataset.tooltip = dir
      chip.addEventListener('click', () => { activeFolder = dir; applyFilter() })
      folderBar.appendChild(chip)
    }
  }

  // ── Filter ─────────────────────────────────────────────────────────────────
  function applyFilter() {
    const q = searchTerm.toLowerCase()
    filteredAssets = allAssets.filter(a => {
      const typeMatch = activeType === 'all' || a.type === activeType
      const nameMatch = !q || a.filename.toLowerCase().includes(q)
      const folderMatch = activeFolder === null || (a.directory || '.') === activeFolder
      return typeMatch && nameMatch && folderMatch
    })

    // Precompute group map (used by renderNextBatch for counts)
    groupedAssets = new Map()
    for (const a of filteredAssets) {
      const dir = a.directory || '.'
      if (!groupedAssets.has(dir)) groupedAssets.set(dir, [])
      groupedAssets.get(dir).push(a)
    }

    renderedCount = 0
    grid.innerHTML = ''
    buildFolderBar()
    countEl.textContent = `${filteredAssets.length} asset${filteredAssets.length !== 1 ? 's' : ''}`
    if (filteredAssets.length === 0) {
      grid.innerHTML = `<div class="empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>No assets found</p>
      </div>`
      return
    }
    renderNextBatch()
  }

  // ── Render batch (grouped by directory) ────────────────────────────────────
  function renderNextBatch() {
    const slice = filteredAssets.slice(renderedCount, renderedCount + PAGE_SIZE)
    if (activeFolder !== null) {
      // Single folder view — no group headers needed
      slice.forEach(asset => grid.appendChild(createCard(asset)))
    } else {
      // Group by directory, only emit a header when the group changes
      let lastDir = renderedCount === 0 ? null : (filteredAssets[renderedCount - 1]?.directory || '.')
      for (const asset of slice) {
        const dir = asset.directory || '.'
        if (dir !== lastDir) {
          const count = groupedAssets.get(dir)?.length ?? 0
          grid.appendChild(createGroupHeader(dir, count))
          lastDir = dir
        }
        const card = createCard(asset)
        if (collapsedFolders.has(asset.directory || '.')) card.classList.add('group-collapsed')
        grid.appendChild(card)
      }
    }
    renderedCount += slice.length
  }

  function createGroupHeader(dir, count) {
    const el = document.createElement('div')
    el.className = 'group-header' + (collapsedFolders.has(dir) ? ' collapsed' : '')
    el.dataset.dir = dir
    el.innerHTML = `
      <svg class="folder-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      ${dir}
      <span class="group-count">${count}</span>
      <svg class="group-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    `
    el.addEventListener('click', () => toggleGroup(dir))
    return el
  }

  function toggleGroup(dir) {
    const isCollapsed = collapsedFolders.has(dir)
    if (isCollapsed) {
      collapsedFolders.delete(dir)
    } else {
      collapsedFolders.add(dir)
    }
    // Update header chevron
    const header = grid.querySelector(`.group-header[data-dir="${CSS.escape(dir)}"]`)
    if (header) header.classList.toggle('collapsed', !isCollapsed)
    // Show/hide cards
    grid.querySelectorAll(`.card[data-dir="${CSS.escape(dir)}"]`).forEach(card => {
      card.classList.toggle('group-collapsed', !isCollapsed)
    })
  }

  // ── Card ───────────────────────────────────────────────────────────────────
  function createCard(asset) {
    const card = document.createElement('div')
    card.className = 'card'
    card.dataset.path = asset.absolutePath
    card.dataset.dir = asset.directory || '.'

    const fileUrl = `/file?path=${encodeURIComponent(asset.absolutePath)}`
    const importPath = buildImportPath(asset.relativePath)

    card.innerHTML = `
      <div class="card-preview" data-type="${asset.type}" data-src="${fileUrl}" data-ext="${asset.ext}">
        <span class="type-badge">${asset.ext}</span>
      </div>
      <div class="card-info">
        <div class="card-name" title="${asset.filename}">${asset.filename}</div>
        <div class="card-meta">${formatBytes(asset.size)}</div>
      </div>
      <div class="card-actions">
        <button class="action-btn" data-copy="${asset.relativePath}" data-tooltip="${asset.relativePath}">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <span class="label">Path</span>
        </button>
        <button class="action-btn" data-copy="${asset.filename}" data-tooltip="${asset.filename}">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span class="label">Name</span>
        </button>
        <button class="action-btn" data-copy="${importPath}" data-tooltip="${importPath}">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 18 22 12 16 6"/>
            <polyline points="8 6 2 12 8 18"/>
          </svg>
          <span class="label">Import</span>
        </button>
        <button class="action-btn action-open" data-href="${fileUrl}" data-tooltip="Open in new tab">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          <span class="label">Open</span>
        </button>
      </div>
    `

    // Lazy-load preview
    const preview = card.querySelector('.card-preview')
    previewObserver.observe(preview)

    // Copy buttons
    card.querySelectorAll('.action-btn[data-copy]').forEach(btn => {
      const label = btn.querySelector('.label')
      const originalText = label.textContent
      let restoreTimer = null
      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(btn.dataset.copy).then(() => {
          label.textContent = 'Copied'
          btn.classList.add('copied')
          hideTooltip()
          clearTimeout(restoreTimer)
          restoreTimer = setTimeout(() => {
            label.textContent = originalText
            btn.classList.remove('copied')
          }, 2000)
        })
      })
    })

    // Open button
    const openBtn = card.querySelector('.action-open')
    openBtn.addEventListener('click', () => window.open(openBtn.dataset.href, '_blank'))

    return card
  }

  // ── Lazy preview loader ────────────────────────────────────────────────────
  const previewObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return
      const el = entry.target
      if (el.dataset.loaded) return
      el.dataset.loaded = '1'
      previewObserver.unobserve(el)

      const { type, src, ext } = el.dataset

      if (type === 'image' && ext === 'svg') {
        fetch(src)
          .then(r => r.text())
          .then(svgText => {
            const wrap = document.createElement('div')
            wrap.className = 'svg-wrap'
            wrap.innerHTML = svgText
            // Ensure the root <svg> fills the preview box
            const svgEl = wrap.querySelector('svg')
            if (svgEl) {
              svgEl.removeAttribute('width')
              svgEl.removeAttribute('height')
              svgEl.style.width = '100%'
              svgEl.style.height = '100%'
            }
            el.appendChild(wrap)
          })
          .catch(() => {
            // Fallback to <img> if fetch fails
            const img = document.createElement('img')
            img.src = src
            img.alt = ''
            el.appendChild(img)
          })
      } else if (type === 'image') {
        const img = document.createElement('img')
        img.src = src
        img.alt = ''
        img.loading = 'lazy'
        el.appendChild(img)
      } else if (type === 'video') {
        const vid = document.createElement('video')
        vid.src = src
        vid.autoplay = true
        vid.muted = true
        vid.loop = true
        vid.playsInline = true
        el.appendChild(vid)
      } else if (type === 'font') {
        const name = src.split('/').pop().split('?')[0]
        const style = document.createElement('style')
        style.textContent = `@font-face { font-family: "preview-${ext}"; src: url("${src}"); }`
        document.head.appendChild(style)
        const span = document.createElement('span')
        span.className = 'font-preview'
        span.style.fontFamily = `"preview-${ext}", sans-serif`
        span.textContent = 'Aa'
        el.appendChild(span)
      }
    })
  }, { rootMargin: '200px' })

  // ── Infinite scroll ────────────────────────────────────────────────────────
  const sentinel = document.getElementById('sentinel')
  const scrollObserver = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && renderedCount < filteredAssets.length) {
      renderNextBatch()
    }
  }, { rootMargin: '300px' })
  scrollObserver.observe(sentinel)

  // ── Events ─────────────────────────────────────────────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelector('.filter-btn.active').classList.remove('active')
      btn.classList.add('active')
      activeType = btn.dataset.type
      applyFilter()
    })
  })

  let searchTimer
  searchEl.addEventListener('input', () => {
    clearTimeout(searchTimer)
    searchTimer = setTimeout(() => {
      searchTerm = searchEl.value.trim()
      applyFilter()
    }, 150)
  })

  // ── Helpers ────────────────────────────────────────────────────────────────
  function formatBytes(bytes) {
    if (bytes === 0) return '0 B'
    const k = 1024
    const sizes = ['B', 'KB', 'MB', 'GB']
    const i = Math.floor(Math.log(bytes) / Math.log(k))
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i]
  }

  function buildImportPath(relativePath) {
    // Convert src/assets/foo.svg → @/assets/foo.svg, otherwise keep as-is
    const normalized = relativePath.replace(/\\/g, '/')
    const withAlias = normalized.startsWith('src/')
      ? '@/' + normalized.slice(4)
      : normalized
    return `import assetUrl from '${withAlias}'`
  }

  // ── Live updates (SSE) ─────────────────────────────────────────────────────
  const liveDot = document.getElementById('live-dot')

  function connectSSE() {
    const es = new EventSource('/api/events')

    es.addEventListener('open', () => {
      liveDot.classList.add('connected')
    })

    es.addEventListener('message', e => {
      let event
      try { event = JSON.parse(e.data) } catch { return }

      // Flash the dot
      liveDot.classList.add('active')
      setTimeout(() => liveDot.classList.remove('active'), 600)

      if (event.type === 'add') {
        onAssetAdded(event.asset)
      } else if (event.type === 'remove') {
        onAssetRemoved(event.absolutePath)
      } else if (event.type === 'update') {
        onAssetUpdated(event.asset)
      }
    })

    es.addEventListener('error', () => {
      liveDot.classList.remove('connected')
      es.close()
      // Reconnect after 3s — browser EventSource auto-reconnects but we
      // want to control the delay ourselves after an explicit close
      setTimeout(connectSSE, 3000)
    })
  }

  function onAssetAdded(asset) {
    allAssets.unshift(asset)
    buildFolderBar()

    if (!passesFilter(asset)) return

    filteredAssets.unshift(asset)
    updateCount()

    const empty = grid.querySelector('.empty')
    if (empty) empty.remove()

    const card = createCard(asset)
    card.classList.add('card-new')
    if (activeFolder === null && collapsedFolders.has(asset.directory || '.')) {
      card.classList.add('group-collapsed')
    }
    grid.prepend(card)
    renderedCount++
  }

  function onAssetRemoved(absolutePath) {
    allAssets = allAssets.filter(a => a.absolutePath !== absolutePath)
    filteredAssets = filteredAssets.filter(a => a.absolutePath !== absolutePath)
    buildFolderBar()
    updateCount()

    const card = grid.querySelector(`[data-path="${CSS.escape(absolutePath)}"]`)
    if (card) {
      card.remove()
      renderedCount = Math.max(0, renderedCount - 1)
    }

    if (filteredAssets.length === 0) showEmpty()
  }

  function onAssetUpdated(asset) {
    // Update master list in-place
    const idx = allAssets.findIndex(a => a.absolutePath === asset.absolutePath)
    if (idx !== -1) allAssets[idx] = asset

    const fidx = filteredAssets.findIndex(a => a.absolutePath === asset.absolutePath)
    if (fidx !== -1) filteredAssets[fidx] = asset

    // Bust the image/video src cache on the rendered card
    const card = grid.querySelector(`[data-path="${CSS.escape(asset.absolutePath)}"]`)
    if (!card) return

    const ts = Date.now()
    const newUrl = `/file?path=${encodeURIComponent(asset.absolutePath)}&t=${ts}`

    // Update preview src
    const preview = card.querySelector('.card-preview')
    if (preview) {
      preview.dataset.src = newUrl
      const img = preview.querySelector('img')
      if (img) img.src = newUrl
      const vid = preview.querySelector('video')
      if (vid) { vid.src = newUrl; vid.load() }
    }

    // Update size text
    const meta = card.querySelector('.card-meta')
    if (meta) meta.textContent = formatBytes(asset.size)

    // Flash border
    card.classList.remove('card-updated')
    void card.offsetWidth // force reflow to restart animation
    card.classList.add('card-updated')
  }

  function passesFilter(asset) {
    const typeMatch = activeType === 'all' || asset.type === activeType
    const nameMatch = !searchTerm || asset.filename.toLowerCase().includes(searchTerm.toLowerCase())
    const folderMatch = activeFolder === null || (asset.directory || '.') === activeFolder
    return typeMatch && nameMatch && folderMatch
  }

  function updateCount() {
    const n = filteredAssets.length
    countEl.textContent = `${n} asset${n !== 1 ? 's' : ''}`
  }

  function showEmpty() {
    grid.innerHTML = `<div class="empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <p>No assets found</p>
    </div>`
  }

  // ── Global tooltip ─────────────────────────────────────────────────────────
  const tooltipEl = document.getElementById('tooltip')
  let tooltipTimer = null

  function showTooltip(text, anchorEl) {
    clearTimeout(tooltipTimer)
    tooltipEl.textContent = text
    tooltipEl.classList.add('show')
    positionTooltip(anchorEl)
  }

  function hideTooltip() {
    tooltipEl.classList.remove('show')
  }

  function positionTooltip(anchorEl) {
    const rect = anchorEl.getBoundingClientRect()
    const tw = tooltipEl.offsetWidth
    const th = tooltipEl.offsetHeight
    const gap = 6
    const vw = window.innerWidth

    // Prefer above the element
    let top = rect.top - th - gap
    let left = rect.left + rect.width / 2 - tw / 2

    // Flip below if not enough space above
    if (top < 4) top = rect.bottom + gap

    // Clamp horizontally within viewport
    if (left < 6) left = 6
    if (left + tw > vw - 6) left = vw - tw - 6

    tooltipEl.style.top = `${top}px`
    tooltipEl.style.left = `${left}px`
  }

  document.addEventListener('mouseover', e => {
    const target = e.target.closest('[data-tooltip]')
    if (!target) return
    tooltipTimer = setTimeout(() => showTooltip(target.dataset.tooltip, target), 300)
  })

  document.addEventListener('mouseout', e => {
    const target = e.target.closest('[data-tooltip]')
    if (!target) return
    clearTimeout(tooltipTimer)
    hideTooltip()
  })

  // Hide on scroll to avoid stale position
  document.addEventListener('scroll', hideTooltip, true)

  // ── Init ───────────────────────────────────────────────────────────────────
  loadAssets()
  connectSSE()
</script>
</body>
</html>
